<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 음성 판별 퀴즈</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div id="app">

<!-- 🎯 첫 화면 -->
<section id="screen-intro" class="screen active">
  <div class="card">
    <div class="corner-info">
      포커스 과학동아리<br>
      조원: 김시훈, 조한준, 김태우, 이지용
    </div>

    <div class="logo-wrap">
      <img src="images/logo.png" class="club-logo">
    </div>

    <h1>AI 음성 판별 퀴즈</h1>

    <p class="description">
      TTS 기술을 이용하여 선생님들의 목소리와 AI 음성을 구별하는 퀴즈입니다.
    </p>

    <button id="to-start-screen" class="main-button">다음</button>
  </div>
</section>

<!-- 시작 -->
<section id="screen-start" class="screen">
  <div class="card">
    <h2>퀴즈를 시작하시겠습니까?</h2>

    <div class="button-group">
      <button id="start-quiz-button" class="main-button">시작하기</button>
      <button id="back-to-intro" class="sub-button">돌아가기</button>
    </div>
  </div>
</section>

<!-- 학년 -->
<section id="screen-grade" class="screen">
  <div class="card">
    <h2>학년 선택</h2>

    <div class="button-group vertical-group">
      <button class="main-button grade-button" data-grade="1">1학년</button>
      <button class="main-button grade-button" data-grade="2">2학년</button>
      <button class="main-button grade-button" data-grade="3">3학년</button>
    </div>

    <button id="back-to-start" class="sub-button">돌아가기</button>
  </div>
</section>

<!-- 선생님 -->
<section id="screen-teacher-intro" class="screen">
  <div class="card">

    <div class="silhouette-placeholder">
      <img id="teacher-silhouette" src="images/noseungpyo.png">
    </div>

    <h2 id="teacher-intro-title"></h2>

    <div class="button-group">
      <button id="to-question-screen" class="main-button">다음</button>
      <button id="back-to-grade" class="sub-button">돌아가기</button>
    </div>
  </div>
</section>

<!-- 문제 -->
<section id="screen-question" class="screen">
  <div class="card">

    <h2 id="question-teacher-name"></h2>

    <div class="play-area">
      <button id="play-audio-1" class="main-button">1번 듣기</button>
      <button id="play-audio-2" class="main-button">2번 듣기</button>
    </div>

    <div class="button-group">
      <button id="answer-1-button" class="sub-button">1번</button>
      <button id="answer-2-button" class="sub-button">2번</button>
    </div>

    <button id="check-answer-button" class="main-button">정답 확인</button>

  </div>
</section>

<!-- 결과 -->
<section id="screen-end" class="screen">
  <div class="card">

    <h2>결과</h2>

    <p id="score-text"></p>

    <div class="button-group">
      <button id="to-ethics-screen" class="main-button">다음</button>
      <button id="restart-button" class="sub-button">처음으로</button>
    </div>

  </div>
</section>

<!-- 윤리 -->
<section id="screen-ethics" class="screen">
  <div class="card">
    <h2>AI 사용 주의</h2>

    <p>
      타인의 목소리를 허락 없이 사용하는 것은 문제가 됩니다.
    </p>

    <button id="to-bonus-screen" class="main-button">다음</button>
  </div>
</section>

<!-- 보너스 -->
<section id="screen-bonus" class="screen">
  <div class="card">

    <h2>보너스 문제</h2>

    <button class="bonus-option sub-button" data-bonus="3">
      동의 받고 사용
    </button>

    <button id="check-bonus-button" class="main-button">
      정답 확인
    </button>

  </div>
</section>

<!-- 🎓 최종 인증 -->
<section id="screen-final" class="screen">
  <div class="card">

    <h2>AI 판별 인증서</h2>

    <p id="final-score-text"></p>

    <p>
      위 학생은 AI 음성을 구별할 수 있으며<br>
      윤리적으로 사용할 수 있음을 인정합니다.
    </p>

    <button id="final-restart-button" class="main-button">
      다시하기
    </button>

  </div>
</section>

</div>

<!-- 🎧 사운드 -->
<audio id="correct-sound" src="sounds/correct.mp3"></audio>
<audio id="wrong-sound" src="sounds/wrong.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
